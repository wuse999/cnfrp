# frpc.toml — FRP 客户端配置示例
# 官方文档: https://gofrp.org/zh-cn/docs/
# 更多配置参考: https://github.com/fatedier/frp/blob/dev/conf/frpc_full_example.toml

# ─── 服务端连接 ──────────────────────────────────────────────────────────────
# 使用 FRPNAT.COM 公共节点时，将 serverAddr 改为对应节点域名/IP
# 例如: node1.frpnat.com
serverAddr = "node1.frpnat.com"
serverPort = 7000

# ─── 身份验证（与服务端保持一致）──────────────────────────────────────────
auth.method = "token"
auth.token  = "REPLACE_WITH_YOUR_SECRET_TOKEN"

# ─── TLS（服务端开启 tls.force 时必须同步开启）────────────────────────────
# transport.tls.enable = true

# ─── 日志 ────────────────────────────────────────────────────────────────────
log.to      = "/var/log/frpc.log"    # 或 "console"
log.level   = "info"
log.maxDays = 7

# ═══════════════════════════════════════════════════════════════════════════════
# 代理示例 — 按需取消注释并修改
# ═══════════════════════════════════════════════════════════════════════════════

# ── 1. Web 应用 HTTP 穿透（工具分享 / 应用开发调试）────────────────────────
[[proxies]]
name           = "web-app"
type           = "http"
localIP        = "127.0.0.1"
localPort      = 8080
customDomains  = ["myapp.frpnat.com"]
# 可选：启用压缩传输
# transport.useCompression = true

# ── 2. Web 应用 HTTPS 穿透（小程序开发、生产环境）──────────────────────────
# [[proxies]]
# name          = "web-app-https"
# type          = "https"
# localIP       = "127.0.0.1"
# localPort     = 443
# customDomains = ["secure.frpnat.com"]

# ── 3. Jupyter Notebook（数据分析平台）───────────────────────────────────
# [[proxies]]
# name          = "jupyter"
# type          = "http"
# localIP       = "127.0.0.1"
# localPort     = 8888
# customDomains = ["jupyter.frpnat.com"]

