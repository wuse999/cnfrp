# ── 10. STCP 安全点对点隧道（敏感服务，不暴露公网端口）────────────────────
# [[proxies]]
# name       = "secret-ssh"
# type       = "stcp"
# secretKey  = "YOUR_STCP_SECRET_KEY"
# localIP    = "127.0.0.1"
# localPort  = 22

# 对应的访问端配置（在访问方机器上配置）:
# [[visitors]]
# name        = "secret-ssh-visitor"
# type        = "stcp"
# serverName  = "secret-ssh"
# secretKey   = "YOUR_STCP_SECRET_KEY"
# bindAddr    = "127.0.0.1"
# bindPort    = 6022
